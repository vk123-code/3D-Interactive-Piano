<style>

  }

<body>
<div id="root"></div>
<div id="hint">A&nbsp;S&nbsp;D&nbsp;F&nbsp;G&nbsp;H&nbsp;J&nbsp;K&nbsp;L &nbsp;·&nbsp; W&nbsp;E&nbsp;T&nbsp;Y&nbsp;U&nbsp;O&nbsp;P &nbsp;·&nbsp; Click or press keys to play</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Audio Engine ─────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
const audioBuffers = new Map();
const activeNodes = new Map();

function ensureCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Tone.js-style synthesized piano using Web Audio API with harmonic overtones
// for a rich, premium sound without needing external samples
function buildPianoBuffer(ctx, freq, duration = 3.0) {
  const sampleRate = ctx.sampleRate;
  const length = Math.ceil(sampleRate * duration);
  const buffer = ctx.createBuffer(2, length, sampleRate);

  for (let ch = 0; ch < 2; ch++) {
    const data = buffer.getChannelData(ch);
    // Harmonic partials with realistic piano decay
    const partials = [
      { mult: 1.0,  amp: 0.50, decay: 3.5  },
      { mult: 2.0,  amp: 0.22, decay: 2.8  },
      { mult: 3.0,  amp: 0.12, decay: 2.2  },
      { mult: 4.0,  amp: 0.08, decay: 1.8  },
      { mult: 5.0,  amp: 0.05, decay: 1.4  },
      { mult: 6.0,  amp: 0.03, decay: 1.0  },
      { mult: 7.0,  amp: 0.015,decay: 0.8  },
      { mult: 8.0,  amp: 0.008,decay: 0.6  },
      // Slight inharmonicity – real piano strings
      { mult: 2.003,amp: 0.04, decay: 2.6  },
      { mult: 3.007,amp: 0.02, decay: 1.9  },
    ];

    const attackSamples = Math.ceil(0.004 * sampleRate);
    const stereoOffset = ch === 1 ? 0.0007 : 0; // tiny stereo spread

    for (let i = 0; i < length; i++) {
      const t = i / sampleRate + stereoOffset;
      const attack = Math.min(1, t / 0.004);
      let v = 0;
      for (const p of partials) {
        const decay = Math.exp(-t * (1 / p.decay));
        v += p.amp * decay * Math.sin(2 * Math.PI * p.mult * freq * t);
      }
      // Key-off simulation: soft hammer strike noise at t=0
      const strike = Math.exp(-t * 120) * (Math.random() * 2 - 1) * 0.08;
      data[i] = v * attack + strike;
    }
  }
  return buffer;
}

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function getOrCreateBuffer(midi) {
  if (audioBuffers.has(midi)) return Promise.resolve(audioBuffers.get(midi));
  ensureCtx();
  const freq = midiToFreq(midi);
  const buf = buildPianoBuffer(audioCtx, freq, 4.0);
  audioBuffers.set(midi, buf);
  return Promise.resolve(buf);
}

async function playNote(midi, velocity = 0.85) {
  ensureCtx();
  // Stop previous instance of same note to avoid buildup
  if (activeNodes.has(midi)) {
    try {
      const old = activeNodes.get(midi);
      old.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
      setTimeout(() => { try { old.source.stop(); } catch(e){} }, 150);
    } catch(e) {}
  }

  const buf = await getOrCreateBuffer(midi);
  const source = audioCtx.createBufferSource();
  source.buffer = buf;

  const gain = audioCtx.createGain();
  // Natural velocity curve
  const vel = Math.pow(velocity, 1.4) * 0.72;
  gain.gain.setValueAtTime(vel, audioCtx.currentTime);

  // Subtle convolution-free reverb via two delay lines
  const delay1 = audioCtx.createDelay(0.5);
  delay1.delayTime.value = 0.08;
  const delay2 = audioCtx.createDelay(0.5);
  delay2.delayTime.value = 0.13;
  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.18;
  const feedGain = audioCtx.createGain();
  feedGain.gain.value = 0.25;

  source.connect(gain);
  gain.connect(audioCtx.destination);
  gain.connect(delay1);
  delay1.connect(reverbGain);
  delay2.connect(reverbGain);
  delay1.connect(feedGain);
  feedGain.connect(delay2);
  reverbGain.connect(audioCtx.destination);

  source.start();
  activeNodes.set(midi, { source, gain });
  source.onended = () => { if (activeNodes.get(midi)?.source === source) activeNodes.delete(midi); };
}

function releaseNote(midi) {
  if (!activeNodes.has(midi)) return;
  const { source, gain } = activeNodes.get(midi);
  const t = audioCtx?.currentTime ?? 0;
  gain.gain.setTargetAtTime(0, t, 0.4);
  setTimeout(() => { try { source.stop(); } catch(e){} }, 2500);
}

// ─── Piano Layout ─────────────────────────────────────────────────────────────
// 61 keys: C2 (midi 36) through C7 (midi 96)
const START_MIDI = 36;
const NUM_KEYS = 61;

const WHITE_W = 2.2;
const WHITE_H = 1.2;   // height (Y)
const WHITE_D = 13.8;  // depth (Z)
const BLACK_W = 1.28;
const BLACK_H = 1.85;
const BLACK_D = 8.8;
const KEY_GAP = 0.06;
const DEPRESS_Y = 0.28;

// Build key data
const keys = [];
let whiteIndex = 0;

for (let i = 0; i < NUM_KEYS; i++) {
  const midi = START_MIDI + i;
  const noteInOctave = midi % 12;
  const isBlack = [1,3,6,8,10].includes(noteInOctave);
  const octave = Math.floor(midi / 12) - 1;
  const noteName = NOTE_NAMES[noteInOctave];

  if (!isBlack) {
    keys.push({ midi, isBlack, whiteIndex, noteName, octave });
    whiteIndex++;
  } else {
    keys.push({ midi, isBlack, whiteIndex, noteName, octave });
  }
}

const totalWhites = keys.filter(k => !k.isBlack).length;
const KEYBOARD_WIDTH = totalWhites * (WHITE_W + KEY_GAP);

// ─── Three.js Scene ───────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('root').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04030a);
scene.fog = new THREE.FogExp2(0x050310, 0.022);

// Camera
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 500);
const CAM_BASE = new THREE.Vector3(0, 22, 38);
camera.position.copy(CAM_BASE);
camera.lookAt(0, 0, 0);

// ─── Lighting ─────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x1a1525, 1.2);
ambientLight.name = 'ambientLight';
scene.add(ambientLight);

// Main key light – large, soft, slightly warm
const keyLight = new THREE.DirectionalLight(0xfff5e8, 3.2);
keyLight.name = 'keyLight';
keyLight.position.set(-20, 55, 30);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 10;
keyLight.shadow.camera.far = 150;
keyLight.shadow.camera.left = -80;
keyLight.shadow.camera.right = 80;
keyLight.shadow.camera.top = 60;
keyLight.shadow.camera.bottom = -40;
keyLight.shadow.bias = -0.001;
keyLight.shadow.normalBias = 0.02;
keyLight.shadow.radius = 3;
scene.add(keyLight);

// Rim light – cool blue from behind
const rimLight = new THREE.DirectionalLight(0x4466bb, 0.6);
rimLight.name = 'rimLight';
rimLight.position.set(10, 20, -60);
scene.add(rimLight);

// Fill light – very subtle warm fill from front-right
const fillLight = new THREE.PointLight(0xffd090, 0.4, 120);
fillLight.name = 'fillLight';
fillLight.position.set(30, 15, 50);
scene.add(fillLight);

// ─── Materials ────────────────────────────────────────────────────────────────
// Premium ivory white key material
const whiteMat = new THREE.MeshStandardMaterial({
  color: 0xf0ede2,
  roughness: 0.28,
  metalness: 0.0,
  envMapIntensity: 0.6,
});
whiteMat.name = 'whiteMat';

// Hover / pressed variant – we'll tint individual meshes
const whiteHoverMat = new THREE.MeshStandardMaterial({
  color: 0xfaf8f0,
  roughness: 0.22,
  metalness: 0.0,
  envMapIntensity: 0.9,
  emissive: new THREE.Color(0xfff3cc),
  emissiveIntensity: 0.06,
});
whiteHoverMat.name = 'whiteHoverMat';

const whitePressedMat = new THREE.MeshStandardMaterial({
  color: 0xe8e4d8,
  roughness: 0.32,
  metalness: 0.0,
  envMapIntensity: 0.5,
  emissive: new THREE.Color(0xffc060),
  emissiveIntensity: 0.12,
});
whitePressedMat.name = 'whitePressedMat';

// Deep polished ebony black key
const blackMat = new THREE.MeshStandardMaterial({
  color: 0x0a0906,
  roughness: 0.08,
  metalness: 0.15,
  envMapIntensity: 1.4,
});
blackMat.name = 'blackMat';

const blackHoverMat = new THREE.MeshStandardMaterial({
  color: 0x1a1814,
  roughness: 0.06,
  metalness: 0.2,
  envMapIntensity: 1.6,
  emissive: new THREE.Color(0xffeeaa),
  emissiveIntensity: 0.04,
});
blackHoverMat.name = 'blackHoverMat';

const blackPressedMat = new THREE.MeshStandardMaterial({
  color: 0x0d0c09,
  roughness: 0.10,
  metalness: 0.12,
  envMapIntensity: 1.2,
  emissive: new THREE.Color(0xff9933),
  emissiveIntensity: 0.15,
});
blackPressedMat.name = 'blackPressedMat';

// Piano frame/body material – deep mahogany lacquer
const frameMat = new THREE.MeshStandardMaterial({
  color: 0x0c0808,
  roughness: 0.05,
  metalness: 0.25,
  envMapIntensity: 1.8,
});
frameMat.name = 'frameMat';

// Reflective floor
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x080608,
  roughness: 0.12,
  metalness: 0.6,
  envMapIntensity: 1.0,
});
floorMat.name = 'floorMat';

// ─── Environment map (procedural gradient cube) ───────────────────────────────
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x111018);
const envTexture = pmremGen.fromScene(envScene).texture;
scene.environment = envTexture;
whiteMat.envMap = envTexture;
whiteHoverMat.envMap = envTexture;
whitePressedMat.envMap = envTexture;
blackMat.envMap = envTexture;
blackHoverMat.envMap = envTexture;
blackPressedMat.envMap = envTexture;
frameMat.envMap = envTexture;
floorMat.envMap = envTexture;

// ─── Geometry helpers ─────────────────────────────────────────────────────────
function makeRoundedBox(w, h, d, r, segs = 3) {
  // Approximate beveled box using a BufferGeometry
  const geo = new THREE.BoxGeometry(w, h, d, segs, segs, segs);
  return geo;
}

// ─── Build Piano ──────────────────────────────────────────────────────────────
const pianoGroup = new THREE.Group();
pianoGroup.name = 'pianoGroup';
scene.add(pianoGroup);

// Frame / body
const frameW = KEYBOARD_WIDTH + 6;
const frameD = WHITE_D + 8;
const frameH = 3.5;

// Piano body base
const bodyGeo = new THREE.BoxGeometry(frameW, frameH, frameD);
const bodyMesh = new THREE.Mesh(bodyGeo, frameMat);
bodyMesh.name = 'pianoBody';
bodyMesh.position.set(0, -frameH / 2 - WHITE_H / 2, 1);
bodyMesh.receiveShadow = true;
bodyMesh.castShadow = true;
pianoGroup.add(bodyMesh);

// Fallboard (lid)
const fallboardGeo = new THREE.BoxGeometry(frameW, 0.45, 2.5);
const fallboardMesh = new THREE.Mesh(fallboardGeo, frameMat);
fallboardMesh.name = 'fallboard';
fallboardMesh.position.set(0, WHITE_H / 2 + 0.2, -WHITE_D / 2 - 1.5);
fallboardMesh.castShadow = true;
pianoGroup.add(fallboardMesh);

// Key ledge (front rail under keys)
const ledgeGeo = new THREE.BoxGeometry(frameW, 0.5, 2);
const ledgeMesh = new THREE.Mesh(ledgeGeo, frameMat);
ledgeMesh.name = 'keyLedge';
ledgeMesh.position.set(0, -WHITE_H / 2 - 0.25, WHITE_D / 2 + 1.0);
ledgeMesh.castShadow = true;
pianoGroup.add(ledgeMesh);

// ─── Build Keys ───────────────────────────────────────────────────────────────
const keyMeshes = new Map(); // midi -> mesh
const keyStates = new Map(); // midi -> { pressed, hovering, animY, targetY, velY }

const whiteGeo = new THREE.BoxGeometry(WHITE_W, WHITE_H, WHITE_D);
const blackGeo = new THREE.BoxGeometry(BLACK_W, BLACK_H, BLACK_D);

// Compute white key X positions
const whitePositions = new Map();
{
  let wx = -KEYBOARD_WIDTH / 2 + WHITE_W / 2;
  for (const k of keys) {
    if (!k.isBlack) {
      whitePositions.set(k.midi, wx);
      wx += WHITE_W + KEY_GAP;
    }
  }
}

// Place keys
for (const k of keys) {
  let mesh, x, y, z;

  if (!k.isBlack) {
    mesh = new THREE.Mesh(whiteGeo, whiteMat);
    x = whitePositions.get(k.midi);
    y = 0;
    z = 0;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
  } else {
    mesh = new THREE.Mesh(blackGeo, blackMat);
    // Find surrounding white keys
    const prevWhiteMidi = k.midi - 1; // always a white key below black
    const prevX = whitePositions.get(prevWhiteMidi);
    x = prevX + (WHITE_W + KEY_GAP) * 0.5;
    y = (BLACK_H - WHITE_H) / 2;
    z = -(WHITE_D - BLACK_D) / 2;
    mesh.castShadow = true;
  }

  mesh.position.set(x, y, z);
  mesh.name = `key_${k.midi}`;
  mesh.userData = { midi: k.midi, isBlack: k.isBlack, baseY: y, baseX: x };
  pianoGroup.add(mesh);
  keyMeshes.set(k.midi, mesh);
  keyStates.set(k.midi, {
    pressed: false,
    hovering: false,
    animY: y,
    targetY: y,
    velY: 0,
    glowIntensity: 0,
  });
}

// ─── Glow sprites per key ─────────────────────────────────────────────────────
const glowTexture = (() => {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0,   'rgba(255,230,160,0.9)');
  grad.addColorStop(0.3, 'rgba(255,210,100,0.5)');
  grad.addColorStop(0.7, 'rgba(255,180,60,0.15)');
  grad.addColorStop(1,   'rgba(255,150,30,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
})();

const glowMat = new THREE.SpriteMaterial({
  map: glowTexture,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  opacity: 0,
});
glowMat.name = 'glowMat';

const glowSprites = new Map();
for (const k of keys) {
  const mat = glowMat.clone();
  const sprite = new THREE.Sprite(mat);
  sprite.name = `glow_${k.midi}`;
  const mesh = keyMeshes.get(k.midi);
  sprite.position.set(
    mesh.position.x,
    mesh.position.y + (k.isBlack ? BLACK_H : WHITE_H) / 2 + 0.5,
    mesh.position.z + (k.isBlack ? 0 : WHITE_D / 2 - 2)
  );
  sprite.scale.set(k.isBlack ? 5 : 7, k.isBlack ? 5 : 7, 1);
  sprite.renderOrder = 10;
  pianoGroup.add(sprite);
  glowSprites.set(k.midi, sprite);
}

// ─── Floor / Stage ────────────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(400, 400, 1, 1);
const floorMesh = new THREE.Mesh(floorGeo, floorMat);
floorMesh.name = 'floor';
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = -frameH - WHITE_H / 2 - 0.01;
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// ─── Particles ────────────────────────────────────────────────────────────────
const MAX_PARTICLES = 200;
const particleGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(MAX_PARTICLES * 3);
const pOpacities = new Float32Array(MAX_PARTICLES);
const pSizes = new Float32Array(MAX_PARTICLES);
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
particleGeo.setAttribute('opacity', new THREE.BufferAttribute(pOpacities, 1));
particleGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));

const particleShader = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `
    attribute float opacity;
    attribute float size;
    varying float vOpacity;
    void main() {
      vOpacity = opacity;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (300.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying float vOpacity;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      float a = smoothstep(0.5, 0.1, d) * vOpacity;
      gl_FragColor = vec4(1.0, 0.88, 0.55, a);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
particleShader.name = 'particleShader';

const particleSystem = new THREE.Points(particleGeo, particleShader);
particleSystem.name = 'particleSystem';
particleSystem.renderOrder = 20;
scene.add(particleSystem);

const particles = [];

function spawnParticles(worldPos, count = 12) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: worldPos.x + (Math.random() - 0.5) * 2,
      y: worldPos.y + Math.random() * 0.5,
      z: worldPos.z + (Math.random() - 0.5) * 2,
      vx: (Math.random() - 0.5) * 0.04,
      vy: 0.015 + Math.random() * 0.03,
      vz: (Math.random() - 0.5) * 0.04,
      life: 1.0,
      decay: 0.012 + Math.random() * 0.018,
      size: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= p.decay;
    p.x += p.vx;
    p.y += p.vy;
    p.z += p.vz;
    p.vy -= 0.0008;
    if (p.life <= 0) particles.splice(i, 1);
  }

  const count = Math.min(particles.length, MAX_PARTICLES);
  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (i < count) {
      const p = particles[i];
      pPositions[i * 3]     = p.x;
      pPositions[i * 3 + 1] = p.y;
      pPositions[i * 3 + 2] = p.z;
      pOpacities[i] = p.life;
      pSizes[i] = p.size;
    } else {
      pPositions[i * 3] = 0;
      pPositions[i * 3 + 1] = -9999;
      pPositions[i * 3 + 2] = 0;
      pOpacities[i] = 0;
      pSizes[i] = 0;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.opacity.needsUpdate = true;
  particleGeo.attributes.size.needsUpdate = true;
}

// ─── Post-processing ──────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.38,   // strength
  0.55,   // radius
  0.72    // threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─── Raycasting ───────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(9999, 9999);
let hoveredMidi = null;
let mouseDownMidi = null;

const keyMeshArray = [...keyMeshes.values()];

function getKeyAtMouse() {
  raycaster.setFromCamera(mouse, camera);
  // Sort: black keys first (higher render priority)
  const blackMeshes = keyMeshArray.filter(m => m.userData.isBlack);
  const whiteMeshes = keyMeshArray.filter(m => !m.userData.isBlack);
  let hit = raycaster.intersectObjects(blackMeshes);
  if (!hit.length) hit = raycaster.intersectObjects(whiteMeshes);
  return hit.length ? hit[0].object.userData.midi : null;
}

// ─── Key press logic ──────────────────────────────────────────────────────────
function pressKey(midi) {
  if (!keyStates.has(midi)) return;
  const state = keyStates.get(midi);
  if (state.pressed) return;
  state.pressed = true;
  state.targetY = state.animY - DEPRESS_Y; // will be set properly in loop

  const mesh = keyMeshes.get(k => k);
  const km = keyMeshes.get(midi);
  if (km) {
    const baseY = km.userData.baseY;
    keyStates.get(midi).targetY = baseY - DEPRESS_Y;
  }

  // Update material
  updateKeyMaterial(midi);

  // Glow
  keyStates.get(midi).glowIntensity = 1.0;

  // Particles
  const m = keyMeshes.get(midi);
  if (m) {
    const wp = new THREE.Vector3();
    m.getWorldPosition(wp);
    wp.y += 1.5;
    wp.z += m.userData.isBlack ? 0 : 4;
    spawnParticles(wp, 10);
  }

  // Sound
  playNote(midi, 0.82 + Math.random() * 0.15);
}

function releaseKey(midi) {
  if (!keyStates.has(midi)) return;
  const state = keyStates.get(midi);
  if (!state.pressed) return;
  state.pressed = false;
  const km = keyMeshes.get(midi);
  if (km) state.targetY = km.userData.baseY;
  updateKeyMaterial(midi);
}

function updateKeyMaterial(midi) {
  const mesh = keyMeshes.get(midi);
  if (!mesh) return;
  const state = keyStates.get(midi);
  const isBlack = mesh.userData.isBlack;
  if (state.pressed) {
    mesh.material = isBlack ? blackPressedMat : whitePressedMat;
  } else if (state.hovering) {
    mesh.material = isBlack ? blackHoverMat : whiteHoverMat;
  } else {
    mesh.material = isBlack ? blackMat : whiteMat;
  }
}

// ─── Mouse events ─────────────────────────────────────────────────────────────
const canvas = renderer.domElement;

canvas.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  const midi = getKeyAtMouse();

  if (midi !== hoveredMidi) {
    if (hoveredMidi !== null) {
      const s = keyStates.get(hoveredMidi);
      if (s && !s.pressed) { s.hovering = false; updateKeyMaterial(hoveredMidi); }
    }
    if (midi !== null) {
      const s = keyStates.get(midi);
      if (s && !s.pressed) { s.hovering = true; updateKeyMaterial(midi); }
    }
    hoveredMidi = midi;
  }

  // If mouse button held and dragging to new key
  if (mouseDownMidi !== null && midi !== null && midi !== mouseDownMidi) {
    releaseKey(mouseDownMidi);
    mouseDownMidi = midi;
    pressKey(midi);
  }
});

canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const midi = getKeyAtMouse();
  if (midi !== null) {
    mouseDownMidi = midi;
    pressKey(midi);
  }
});

canvas.addEventListener('mouseup', () => {
  if (mouseDownMidi !== null) {
    releaseKey(mouseDownMidi);
    mouseDownMidi = null;
  }
});

canvas.addEventListener('mouseleave', () => {
  if (mouseDownMidi !== null) { releaseKey(mouseDownMidi); mouseDownMidi = null; }
  if (hoveredMidi !== null) {
    const s = keyStates.get(hoveredMidi);
    if (s) { s.hovering = false; updateKeyMaterial(hoveredMidi); }
    hoveredMidi = null;
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  ensureCtx();
  for (const touch of e.changedTouches) {
    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    const midi = getKeyAtMouse();
    if (midi !== null) pressKey(midi);
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    const midi = getKeyAtMouse();
    if (midi !== null) releaseKey(midi);
  }
}, { passive: false });

// ─── Keyboard input mapping ───────────────────────────────────────────────────
// White keys: A S D F G H J K L  → C3 D3 E3 F3 G3 A3 B3 C4 D4
// Black keys: W E   T Y U   O P  → C#3 D#3 F#3 G#3 A#3 C#4 D#4
const KB_MAP = {
  'a': 48, // C3
  'w': 49, // C#3
  's': 50, // D3
  'e': 51, // D#3
  'd': 52, // E3
  'f': 53, // F3
  't': 54, // F#3
  'g': 55, // G3
  'y': 56, // G#3
  'h': 57, // A3
  'u': 58, // A#3
  'j': 59, // B3
  'k': 60, // C4
  'o': 61, // C#4
  'l': 62, // D4
  'p': 63, // D#4
  ';': 64, // E4
};

const heldKeys = new Set();

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const key = e.key.toLowerCase();
  const midi = KB_MAP[key];
  if (midi !== undefined && !heldKeys.has(key)) {
    heldKeys.add(key);
    pressKey(midi);
  }
});

window.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  const midi = KB_MAP[key];
  if (midi !== undefined) {
    heldKeys.delete(key);
    releaseKey(midi);
  }
});

// ─── Camera parallax ─────────────────────────────────────────────────────────
const camTarget = new THREE.Vector3();
const camCurrent = new THREE.Vector3().copy(CAM_BASE);
const PARALLAX_STRENGTH = 1.4;

window.addEventListener('mousemove', (e) => {
  const nx = (e.clientX / window.innerWidth - 0.5) * 2;
  const ny = (e.clientY / window.innerHeight - 0.5) * 2;
  camTarget.set(
    CAM_BASE.x + nx * PARALLAX_STRENGTH,
    CAM_BASE.y - ny * 0.6,
    CAM_BASE.z
  );
});

// ─── Animation loop ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const PRESS_SPEED   = 1 / 0.08;  // per second
const RELEASE_SPEED = 1 / 0.12;

// Easing helpers
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInCubic(t)  { return t * t * t; }

// Track animation progress 0→1 per key
const animProgress = new Map();
keys.forEach(k => animProgress.set(k.midi, 0));

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);

  // Smooth camera parallax
  camCurrent.lerp(camTarget.lengthSq() > 0 ? camTarget : CAM_BASE, 1 - Math.pow(0.02, dt));
  camera.position.copy(camCurrent);
  camera.lookAt(0, 0, 0);

  // Animate keys
  for (const k of keys) {
    const state = keyStates.get(k.midi);
    const mesh = keyMeshes.get(k.midi);
    if (!state || !mesh) continue;

    const baseY = mesh.userData.baseY;
    const pressedY = baseY - DEPRESS_Y;

    if (state.pressed) {
      // Ease toward pressed
      const p = animProgress.get(k.midi);
      const np = Math.min(1, p + dt * PRESS_SPEED);
      animProgress.set(k.midi, np);
      mesh.position.y = THREE.MathUtils.lerp(baseY, pressedY, easeOutCubic(np));
    } else {
      // Ease back to rest
      const p = animProgress.get(k.midi);
      const np = Math.max(0, p - dt * RELEASE_SPEED);
      animProgress.set(k.midi, np);
      mesh.position.y = THREE.MathUtils.lerp(baseY, pressedY, easeOutCubic(np));
    }

    // Glow sprite
    const glow = glowSprites.get(k.midi);
    if (glow) {
      state.glowIntensity = state.pressed
        ? Math.min(1, state.glowIntensity + dt * 12)
        : Math.max(0, state.glowIntensity - dt * 3.5);
      glow.material.opacity = state.glowIntensity * (k.isBlack ? 0.7 : 0.55);
      const sc = k.isBlack ? 5 : 7;
      const s = sc * (0.9 + state.glowIntensity * 0.4);
      glow.scale.set(s, s, 1);
      glow.position.y = mesh.position.y + (k.isBlack ? BLACK_H : WHITE_H) / 2 + 0.6;
    }
  }

  updateParticles();
  composer.render();
}

renderer.setAnimationLoop(animate);

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloom.setSize(window.innerWidth, window.innerHeight);
});

// Init cam target
camTarget.copy(CAM_BASE);
</script>
</body>
</html>
